target-version = "py310"
line-length = 120

extend-exclude = [
    ".git",
    ".venv",
    "build",
    "sdk",
    "termin-app/third",
    "termin-thirdparty",
]

[lint]
# First-stage linting: catch likely runtime errors without creating a large
# style migration. Formatting and broader cleanup rules should be enabled
# after the current codebase is clean on this baseline.
select = [
    "B006",
    "B009",
    "B010",
    "B011",
    "B012",
    "B018",
    "E9",
    "F63",
    "F7",
    "F821",
    "F822",
    "F823",
]
