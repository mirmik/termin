# Termin SDK module definitions.
# Read by build-and-install-cpp.sh, build-and-install-bindings.sh, run-tests-cpp.sh.
#
# Format: name | directory | has_python_bindings | test_flag | extra_cmake_args
#   - Lines starting with # are comments
#   - Empty lines are ignored
#   - directory is relative to termin-env root
#   - has_python_bindings: yes/no — whether build-and-install-bindings.sh builds this module
#   - test_flag: cmake option to enable tests, or "-" if no tests
#   - extra_cmake_args: additional cmake arguments, or "-" if none
#
# Special entries:
#   @termin-cpp  — builds termin C++ only (build_termin_cpp_only)
#   @termin-full — builds termin with Python bundle (termin/build.sh)

# ── Core libraries ──
termin-base                | termin-base                                          | yes | TERMIN_BASE_BUILD_TESTS    | -
termin-modules             | termin-modules                                       | yes | TERMIN_MODULES_BUILD_TESTS | -
termin-mesh                | termin-mesh                                          | yes | -                          | -
termin-graphics            | termin-graphics                                      | yes | BUILD_TESTS                | -
termin-inspect             | termin-inspect                                       | yes | TI_BUILD_TESTS             | -
termin-scene               | termin-scene                                         | yes | TERMIN_SCENE_BUILD_TESTS   | -
termin-render              | termin-render                                        | yes | TERMIN_RENDER_BUILD_TESTS  | -
termin-input               | termin-input                                         | yes | -                          | -
termin-display             | termin-display                                       | yes | -                          | -
termin-collision           | termin-collision                                     | yes | TERMIN_COLLISION_BUILD_TESTS | -
termin-physics             | termin-physics                                       | yes | -                          | -

# ── Component libraries ──
termin-components-collision  | termin-components/termin-components-collision       | yes | -                          | -
termin-components-render     | termin-components/termin-components-render          | yes | -                          | -
termin-components-mesh       | termin-components/termin-components-mesh            | yes | -                          | -
termin-engine                | termin-engine                                       | yes | -                          | -
termin-components-kinematic  | termin-components/termin-components-kinematic       | yes | -                          | -
termin-components-physics    | termin-components/termin-components-physics         | yes | -                          | -
termin-skeleton              | termin-skeleton                                     | yes | -                          | -
termin-animation             | termin-animation                                    | yes | -                          | -
termin-components-skeleton   | termin-components/termin-components-skeleton        | yes | -                          | -

# ── Main termin project (C++ only, no nanobind) ──
@termin-cpp

# ── Post-termin component ──
termin-components-animation  | termin-components/termin-components-animation       | yes | -                          | -
