name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  LD_LIBRARY_PATH: /opt/termin/lib

jobs:
  cpp-tests:
    name: C/C++ Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3-dev libgl1-mesa-dev libsdl2-dev qt6-base-dev

      - name: Install Python dependencies
        run: pip install nanobind

      - name: Download all SDK artifacts
        env:
          GH_TOKEN: ${{ secrets.CLONETOKEN }}
        run: |
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-base -p sdk-base.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-base.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-mesh -p sdk-mesh.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-mesh.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-inspect -p sdk-inspect.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-inspect.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-scene -p sdk-scene.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-scene.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-graphics -p sdk-graphics.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-graphics.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-collision -p sdk-collision.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-collision.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-components -p sdk-components.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-components.tar.gz -C /

      - name: Configure with tests
        run: |
          cmake -S . -B build_test \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=/opt/termin \
            -DPython_EXECUTABLE=$(which python3)

      - name: Build
        run: cmake --build build_test --parallel

      - name: Run C/C++ tests
        run: ctest --output-on-failure --test-dir build_test

  standalone-build:
    name: Standalone Build (build.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3-dev libgl1-mesa-dev libsdl2-dev qt6-base-dev

      - name: Install Python dependencies
        run: pip install nanobind

      - name: Download all SDK artifacts
        env:
          GH_TOKEN: ${{ secrets.CLONETOKEN }}
        run: |
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-base -p sdk-base.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-base.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-mesh -p sdk-mesh.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-mesh.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-inspect -p sdk-inspect.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-inspect.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-scene -p sdk-scene.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-scene.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-graphics -p sdk-graphics.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-graphics.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-collision -p sdk-collision.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-collision.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-components -p sdk-components.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-components.tar.gz -C /

      - name: Build via build.sh
        run: ./build.sh

      - name: Verify install directory
        run: |
          test -f install/bin/termin_editor
          test -f install/bin/termin_launcher
          ldd install/bin/termin_editor

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3-dev libgl1-mesa-dev libsdl2-dev qt6-base-dev

      - name: Download all SDK artifacts
        env:
          GH_TOKEN: ${{ secrets.CLONETOKEN }}
        run: |
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-base -p sdk-base.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-base.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-mesh -p sdk-mesh.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-mesh.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-inspect -p sdk-inspect.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-inspect.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-scene -p sdk-scene.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-scene.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-graphics -p sdk-graphics.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-graphics.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-collision -p sdk-collision.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-collision.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-components -p sdk-components.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-components.tar.gz -C /

      - name: Install Python dependencies
        run: pip install nanobind numpy pytest Pillow scipy pyassimp PyOpenGL glfw PyQt6 pysdl2 /opt/termin/wheels/*.whl

      - name: Build and install
        env:
          CMAKE_PREFIX_PATH: /opt/termin
        run: pip install --no-build-isolation -e .

      - name: Run Python tests
        run: python -m pytest tests/ -v
