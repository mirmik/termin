name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'termin/docs/**'
      - 'termin/mkdocs.yml'
      - 'termin-collision/docs/**'
      - 'termin-collision/mkdocs.yml'
      - 'termin-gui/docs/**'
      - 'termin-gui/mkdocs.yml'
      - 'termin-inspect/docs/**'
      - 'termin-inspect/mkdocs.yml'
      - 'termin-scene/docs/**'
      - 'termin-scene/mkdocs.yml'
      - 'termin-modules/docs/**'
      - 'termin-modules/mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install doc tools
        run: |
          pip install mkdocs mkdocs-material

      - name: Build hub page
        run: mkdocs build -d _site

      - name: Build MkDocs projects
        run: |
          for project in termin termin-collision termin-gui termin-inspect termin-scene termin-modules; do
            echo "=== Building $project docs ==="
            cd $project
            mkdocs build -d ../_site/$project
            cd ..
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
