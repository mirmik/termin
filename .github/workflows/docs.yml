name: Docs

on:
  push:
    branches: [master]
    paths:
      - '**/docs/**'
      - '**/mkdocs.yml'
      - 'build-system/docs-publication.json'
      - 'build-system/python-docs-lock.txt'
      - 'build-system/modules.json'
      - 'build-system/packages.json'
      - 'build-docs.sh'
      - 'setup-docs-env.sh'
      - 'termin-build-tools/termin_build/repository_control.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build manifest-driven documentation
        run: ./build-docs.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
