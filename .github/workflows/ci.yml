name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # ── 0. Python lint ─────────────────────────────────────────────
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Python lint
        run: ./run-lint-python.sh --no-venv

  # ── 0b. Build system smoke ─────────────────────────────────────
  smoke-build-system-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install pytest setuptools wheel

      - name: Validate package manifest
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$pwd\termin-build-tools"
          python -m termin_build.package_manifest --repo-root . --check

      - name: Run build-tools tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$pwd\termin-build-tools"
          python -m pytest termin-build-tools/tests/ -v

      - name: Smoke build-sdk.ps1 wrapper
        shell: pwsh
        run: .\build-sdk.ps1 --no-wheels --no-parallel --dry-run

  # ── 1. Build C++ libraries ───────────────────────────────────────
  build-cpp-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev mesa-vulkan-drivers libshaderc-dev

      - name: Build
        run: ./build-sdk-cpp.sh

      - uses: actions/upload-artifact@v5
        with:
          name: sdk-cpp
          path: sdk/
          retention-days: 1

  # ── 2. Test C++ libraries ────────────────────────────────────────
  test-cpp-libs:
    needs: build-cpp-libs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev mesa-vulkan-drivers libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-cpp
          path: sdk/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - name: Run C++ tests
        run: ./run-tests-cpp.sh

  # ── 3. Build nanobind SDK + Python bindings ────────────────────
  build-bindings:
    needs: build-cpp-libs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-cpp
          path: sdk/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - name: Install nanobind
        run: pip install nanobind

      - name: Build bindings
        run: ./build-sdk-bindings.sh

      - uses: actions/upload-artifact@v5
        with:
          name: sdk-full
          path: sdk/
          retention-days: 1

      - uses: actions/upload-artifact@v5
        with:
          name: sdk-python-staging
          path: build/${{ env.BUILD_TYPE }}/sdk-install-staging/lib/python/
          retention-days: 1

  # ── 4. Test pip packages ───────────────────────────────────────
  test-pip-packages:
    needs: build-bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-full
          path: sdk/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - uses: actions/download-artifact@v5
        with:
          name: sdk-python-staging
          path: sdk-python-staging/

      - name: Install pip packages
        env:
          TERMIN_BINDINGS_DIR: ${{ github.workspace }}/sdk-python-staging
        run: |
          pip install nanobind numpy Pillow PyYAML pytest
          ./install-pip-packages.sh

      - name: Run Python tests
        env:
          TERMIN_SDK: ${{ github.workspace }}/sdk
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
        run: |
          python -c "import termin_modules; env = termin_modules.ModuleEnvironment(); runtime = termin_modules.ModuleRuntime(); runtime.set_environment(env); runtime.register_cpp_backend(termin_modules.CppModuleBackend()); runtime.register_python_backend(termin_modules.PythonModuleBackend())"
          pytest termin-base/tests/python/ -v
          pytest termin-graphics/tests/python/ -v
          pytest termin-gui/python/tests/ -v
          pytest termin-nodegraph/tests/ -v

  # ── 5. Build & test termin ───────────────────────────────────────
  test-termin:
    needs: build-bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-full
          path: sdk/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - uses: actions/download-artifact@v5
        with:
          name: sdk-python-staging
          path: sdk-python-staging/

      - name: Install pip packages
        env:
          TERMIN_BINDINGS_DIR: ${{ github.workspace }}/sdk-python-staging
        run: |
          pip install nanobind numpy Pillow PyYAML pytest PyOpenGL glfw pysdl2 pysdl2-dll pyassimp scipy PyQt6
          ./install-pip-packages.sh --editable

      - name: Build termin bundle
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
        run: |
          cd termin-app
          SDK_PREFIX=${{ github.workspace }}/sdk CMAKE_PREFIX_PATH=${{ github.workspace }}/sdk ./build.sh

      - name: Run tests
        env:
          TERMIN_SDK: ${{ github.workspace }}/sdk
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
          PYTHONPATH: ${{ github.workspace }}/sdk/lib/python:${{ github.workspace }}/sdk-python-staging:${{ github.workspace }}/termin-app/install/lib/python
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "from tgfx import TcShader; shader = TcShader.from_builtin_catalog('termin-engine-voxel-display'); assert shader.is_valid, 'termin-engine-voxel-display failed preflight'"
          pytest termin-app/tests/ -v

  # ── 6. Build termin-csharp ──────────────────────────────────────
  test-csharp:
    needs: test-termin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev libshaderc-dev swig

      - uses: actions/download-artifact@v5
        with:
          name: sdk-full
          path: sdk/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - uses: actions/download-artifact@v5
        with:
          name: sdk-python-staging
          path: sdk-python-staging/

      - name: Install pip packages
        env:
          TERMIN_BINDINGS_DIR: ${{ github.workspace }}/sdk-python-staging
        run: |
          pip install nanobind numpy Pillow PyYAML
          ./install-pip-packages.sh

      - name: Build termin
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
        run: |
          cd termin-app
          SDK_PREFIX=${{ github.workspace }}/sdk CMAKE_PREFIX_PATH=${{ github.workspace }}/sdk ./build.sh

      - name: Build termin-csharp
        run: |
          cmake -S termin-csharp -B termin-csharp/build/Release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/sdk \
            -DTERMIN_CSHARP_BUILD_NATIVE=ON \
            -DTERMIN_CSHARP_BUILD_MANAGED=ON \
            -DTERMIN_CSHARP_BUILD_TESTS=ON
          cmake --build termin-csharp/build/Release --parallel $(nproc)
