name: CI

on:
  push:
    branches: [master]

env:
  SDK_PREFIX: /opt/termin
  BUILD_TYPE: Release

jobs:
  build-cpp:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /opt/termin/lib
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev

      - name: Build and test C++ libraries
        run: |
          sudo mkdir -p $SDK_PREFIX
          sudo chown $USER:$USER $SDK_PREFIX
          ./build-and-install-cpp.sh

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-cpp
          path: /opt/termin/
          retention-days: 1

  build-python:
    needs: build-cpp
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /opt/termin/lib
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev

      - name: Download SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-cpp
          path: /opt/termin/

      - name: Install Python packages
        run: |
          pip install nanobind numpy Pillow PyYAML pytest
          for lib in termin-base termin-mesh termin-graphics; do
            CMAKE_PREFIX_PATH=$SDK_PREFIX pip install --no-build-isolation ./$lib
          done
          pip install ./termin-gui
          pip install ./termin-nodegraph
          CMAKE_PREFIX_PATH=$SDK_PREFIX pip install --no-build-isolation ./termin

      - name: Run Python tests
        run: |
          pytest termin-base/tests/python/ -v
          pytest termin-gui/python/tests/ -v
          pytest termin-nodegraph/tests/ -v
          pytest termin/tests/ -v
          pytest diffusion-editor/tests/ -v
