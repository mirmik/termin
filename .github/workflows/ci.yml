name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Planner inventory ──────────────────────────────────────────
  plan-pr-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Validate manifests and generate PR plan
        env:
          PYTHONPATH: ${{ github.workspace }}/termin-build-tools
        run: |
          python -m termin_build.repository_control --repo-root . check
          mkdir -p build/ci-plans
          python -m termin_build.repository_control --repo-root . \
            plan pr --platform linux --json > build/ci-plans/pr-linux.json
          python -m termin_build.repository_control --repo-root . \
            plan sdk-installed --platform linux --json > build/ci-plans/sdk-installed-linux.json
          python -m termin_build.repository_control --repo-root . \
            plan windows-d3d11-bound --platform windows --json > build/ci-plans/windows-d3d11-bound.json

      - uses: actions/upload-artifact@v5
        with:
          name: ci-plans
          path: build/ci-plans/
          retention-days: 1

  # ── 0. Python lint ─────────────────────────────────────────────
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Python lint
        run: ./run-lint-python.sh --no-venv

  # ── 0a. C/C++ lint ─────────────────────────────────────────────
  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-tidy \
            cmake \
            libclang-18-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libshaderc-dev \
            libsdl2-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            llvm-18-dev

      - name: Run C/C++ lint
        run: ./run-lint-cpp.sh

      - name: Check C++ class member order
        run: |
          ./run-cpp-class-layout-check.sh --self-test
          ./run-cpp-class-layout-check.sh
          ./run-lint-cpp.sh --python-bindings --configure-only
          ./run-cpp-class-layout-check.sh --python-bindings

  # ── 0b. Source size lint ───────────────────────────────────────
  lint-source-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check source file length
        run: python3 scripts/find-long-files.py --threshold 2000 --fail .

  # ── 0c. Build system smoke ─────────────────────────────────────
  smoke-build-system-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install pytest setuptools wheel

      - name: Validate package manifest
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$pwd\termin-build-tools"
          python -m termin_build.package_manifest --repo-root . --check

      - name: Run build-tools tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$pwd\termin-build-tools"
          python -m pytest termin-build-tools/tests/ -v

      - name: Smoke build-sdk.ps1 wrapper
        shell: pwsh
        run: .\build-sdk.ps1 --no-wheels --no-parallel --dry-run

  # ── 0d. D3D11 tgfx2 smoke ─────────────────────────────────────
  tgfx2-d3d11-bound-windows:
    needs: plan-pr-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - uses: actions/download-artifact@v5
        with:
          name: ci-plans
          path: build/ci-plans/

      - name: Validate D3D11 bound resource path
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}\termin-build-tools
        run: |
          python -m termin_build.repository_control --repo-root . \
            run windows-d3d11-bound --platform windows \
            --executor process-smoke \
            --plan-file build/ci-plans/windows-d3d11-bound.json \
            --report-output build/d3d11-execution-manifest.json

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: d3d11-execution-manifest
          path: build/d3d11-execution-manifest.json
          retention-days: 7

  # ── 1. Build C++ libraries ───────────────────────────────────────
  build-cpp-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev mesa-vulkan-drivers libshaderc-dev

      - name: Build
        run: ./build-sdk-cpp.sh

      - uses: actions/upload-artifact@v5
        with:
          name: sdk-cpp
          path: sdk/
          retention-days: 1

  # ── 2. Test C++ libraries ────────────────────────────────────────
  test-cpp-libs:
    needs: [build-cpp-libs, plan-pr-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev mesa-vulkan-drivers libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-cpp
          path: sdk/

      - uses: actions/download-artifact@v5
        with:
          name: ci-plans
          path: build/ci-plans/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - name: Run C++ tests
        env:
          TERMIN_TEST_PLAN: ${{ github.workspace }}/build/ci-plans/pr-linux.json
        run: ./run-tests-cpp.sh

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: ctest-execution-manifest
          path: |
            build/Release-tests/ctest-selection.json
            build/Release-tests/ctest-execution-manifest.json
            build/Release-tests/ctest-results.xml
          retention-days: 7

  # ── 3. Build nanobind SDK + Python bindings ────────────────────
  build-bindings:
    needs: build-cpp-libs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-cpp
          path: sdk/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - name: Install nanobind
        run: pip install nanobind

      - name: Build bindings
        run: ./build-sdk-bindings.sh

      - uses: actions/upload-artifact@v5
        with:
          name: sdk-full
          path: sdk/
          retention-days: 1

      - uses: actions/upload-artifact@v5
        with:
          name: sdk-python-staging
          path: build/${{ env.BUILD_TYPE }}/sdk-install-staging/lib/python/
          retention-days: 1

  # ── 4. Test pip packages ───────────────────────────────────────
  test-pip-packages:
    needs: [build-bindings, plan-pr-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-full
          path: sdk/

      - uses: actions/download-artifact@v5
        with:
          name: ci-plans
          path: build/ci-plans/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - uses: actions/download-artifact@v5
        with:
          name: sdk-python-staging
          path: sdk-python-staging/

      - name: Install pip packages
        env:
          TERMIN_BINDINGS_DIR: ${{ github.workspace }}/sdk-python-staging
        run: |
          pip install nanobind numpy Pillow PyYAML pytest
          ./install-pip-packages.sh

      - name: Run Python tests
        env:
          TERMIN_SDK: ${{ github.workspace }}/sdk
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
        run: |
          ./setup-sdk-python-env.sh
          TERMIN_TEST_PLAN=${{ github.workspace }}/build/ci-plans/pr-linux.json \
          TERMIN_TEST_EXECUTION_MANIFEST=${{ github.workspace }}/build/python-execution-manifest.json \
            ./run-tests-python.sh

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: python-execution-manifest
          path: build/python-execution-manifest.json
          retention-days: 7

  verify-pr-linux-plan:
    needs: [test-cpp-libs, test-pip-packages]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - uses: actions/download-artifact@v5
        with:
          name: ci-plans
          path: build/ci-plans/

      - uses: actions/download-artifact@v5
        with:
          name: ctest-execution-manifest
          path: build/ci-results/ctest/

      - uses: actions/download-artifact@v5
        with:
          name: python-execution-manifest
          path: build/ci-results/python/

      - name: Verify PR inventory coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/termin-build-tools
        run: |
          python -m termin_build.repository_control verify-plan-execution \
            --plan build/ci-plans/pr-linux.json \
            --ctest build/ci-results/ctest/ctest-execution-manifest.json \
            --python build/ci-results/python/python-execution-manifest.json

  # ── 5. Build & test termin ───────────────────────────────────────
  test-termin:
    needs: [build-bindings, plan-pr-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev libshaderc-dev

      - uses: actions/download-artifact@v5
        with:
          name: sdk-full
          path: sdk/

      - uses: actions/download-artifact@v5
        with:
          name: ci-plans
          path: build/ci-plans/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - uses: actions/download-artifact@v5
        with:
          name: sdk-python-staging
          path: sdk-python-staging/

      - name: Install pip packages
        env:
          TERMIN_BINDINGS_DIR: ${{ github.workspace }}/sdk-python-staging
        run: |
          pip install nanobind numpy Pillow PyYAML pytest PyOpenGL glfw pysdl2 pysdl2-dll pyassimp scipy
          ./install-pip-packages.sh --editable

      - name: Build termin bundle
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
        run: |
          cd termin-app
          SDK_PREFIX=${{ github.workspace }}/sdk CMAKE_PREFIX_PATH=${{ github.workspace }}/sdk ./build.sh

      - name: Run tests
        env:
          TERMIN_SDK: ${{ github.workspace }}/sdk
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
          PYTHONPATH: ${{ github.workspace }}/termin-app/install/lib/python:${{ github.workspace }}/sdk-python-staging:${{ github.workspace }}/sdk/lib/python
        run: |
          sdk/bin/termin_python -m termin_build.repository_control \
            --repo-root . run sdk-installed --platform linux \
            --executor process-smoke \
            --plan-file ${{ github.workspace }}/build/ci-plans/sdk-installed-linux.json \
            --report-output build/termin-app-installed-execution-manifest.json

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: termin-app-installed-execution-manifest
          path: build/termin-app-installed-execution-manifest.json
          retention-days: 7

  # ── 6. Build termin-csharp ──────────────────────────────────────
  test-csharp:
    needs: test-termin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libglu1-mesa-dev libsdl2-dev libvulkan-dev libshaderc-dev swig

      - uses: actions/download-artifact@v5
        with:
          name: sdk-full
          path: sdk/

      - name: Restore SDK executable permissions
        run: chmod +x sdk/bin/*

      - uses: actions/download-artifact@v5
        with:
          name: sdk-python-staging
          path: sdk-python-staging/

      - name: Install pip packages
        env:
          TERMIN_BINDINGS_DIR: ${{ github.workspace }}/sdk-python-staging
        run: |
          pip install nanobind numpy Pillow PyYAML
          ./install-pip-packages.sh

      - name: Build termin
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk/lib
        run: |
          cd termin-app
          SDK_PREFIX=${{ github.workspace }}/sdk CMAKE_PREFIX_PATH=${{ github.workspace }}/sdk ./build.sh

      - name: Build termin-csharp
        run: |
          cmake -S termin-csharp -B termin-csharp/build/Release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/sdk \
            -DTERMIN_CSHARP_BUILD_NATIVE=ON \
            -DTERMIN_CSHARP_BUILD_MANAGED=ON \
            -DTERMIN_CSHARP_BUILD_TESTS=ON
          cmake --build termin-csharp/build/Release --parallel $(nproc)
