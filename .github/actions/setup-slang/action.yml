name: Setup Slang
description: Install the pinned Slang compiler used by shader integration tests.

runs:
  using: composite
  steps:
    - name: Install pinned Slang compiler
      shell: bash
      env:
        SLANG_VERSION: "2026.5.2"
        SLANG_SHA256: "15583850c9d12e9ef8664449dfaedd55b3d4abff210bc89c4e666e89e436eaa9"
      run: |
        set -euo pipefail
        archive="$RUNNER_TEMP/slang-$SLANG_VERSION-linux-x86_64-glibc-2.27.tar.gz"
        install_dir="$RUNNER_TOOL_CACHE/slang/$SLANG_VERSION/x64"
        slangc="$install_dir/bin/slangc"

        if [[ ! -x "$slangc" ]]; then
          curl --location --fail --retry 3 \
            --output "$archive" \
            "https://github.com/shader-slang/slang/releases/download/v$SLANG_VERSION/$(basename "$archive")"
          echo "$SLANG_SHA256  $archive" | sha256sum --check --strict
          mkdir -p "$install_dir"
          tar -xzf "$archive" -C "$install_dir"
        fi

        echo "$install_dir/bin" >> "$GITHUB_PATH"
        echo "TERMIN_SLANGC=$slangc" >> "$GITHUB_ENV"
        "$slangc" -version
