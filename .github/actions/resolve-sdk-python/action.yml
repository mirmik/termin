name: Resolve SDK Python layout
description: Expose the canonical site-packages directory from a downloaded Termin SDK.

runs:
  using: composite
  steps:
    - name: Resolve canonical SDK site-packages
      shell: bash
      run: |
        sdk_site_packages="$(
          PYTHONPATH="$GITHUB_WORKSPACE/termin-build-tools" \
            python -m termin_build.sdk --repo-root "$GITHUB_WORKSPACE" \
            resolve-python-layout --sdk-prefix "$GITHUB_WORKSPACE/sdk" \
            --require-native-bindings
        )"
        echo "SDK_SITE_PACKAGES=$sdk_site_packages" >> "$GITHUB_ENV"
