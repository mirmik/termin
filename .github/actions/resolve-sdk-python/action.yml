name: Resolve SDK Python layout
description: Expose the canonical site-packages directory from a downloaded Termin SDK.

runs:
  using: composite
  steps:
    - name: Resolve canonical SDK site-packages
      shell: bash
      run: |
        sdk_site_packages="$(find "$GITHUB_WORKSPACE/sdk/lib" \
          -mindepth 2 \
          -maxdepth 3 \
          -type d \
          -path '*/python*/site-packages' \
          -print \
          -quit)"
        if [[ -z "$sdk_site_packages" ]]; then
          echo "ERROR: canonical SDK site-packages directory not found under $GITHUB_WORKSPACE/sdk/lib" >&2
          exit 1
        fi
        echo "SDK_SITE_PACKAGES=$sdk_site_packages" >> "$GITHUB_ENV"
